<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Church Clock</title>

<style>
html,body{
margin:0;
padding:0;
background:transparent;
overflow:hidden;
}

#clock{
position:absolute;
top:20px;
right:20px;
padding:15px 25px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
border-radius:15px;
font-family:Segoe UI,Arial,sans-serif;
color:white;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

#time{
font-size:46px;
font-weight:bold;
}

#date{
font-size:18px;
margin-top:5px;
opacity:.85;
}

.gold{
height:4px;
background:#d4af37;
margin-bottom:10px;
border-radius:20px;
}
</style>

</head>

<body>

<div id="clock">

<div class="gold"></div>

<div id="time"></div>

<div id="date"></div>

</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("time").innerHTML=
now.toLocaleTimeString("en-NG",{
hour:"numeric",
minute:"2-digit",
second:"2-digit",
hour12:true
});

document.getElementById("date").innerHTML=
now.toLocaleDateString("en-NG",{
weekday:"long",
day:"numeric",
month:"long",
year:"numeric"
});

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
